<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Feedback</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="badge">● Live Feedback</div>

  <h1>How are you feeling?</h1>
  <p class="subtitle">Your feedback helps us improve your experience</p>

  <div class="emotion-container">
    <div class="emotion-card" onclick="selectEmotion('happy', this)">
      <div class="emoji">😊</div>
      <p>Happy</p>
    </div>

    <div class="emotion-card" onclick="selectEmotion('neutral', this)">
      <div class="emoji">😐</div>
      <p>Neutral</p>
    </div>

    <div class="emotion-card" onclick="selectEmotion('frustrated', this)">
      <div class="emoji">😤</div>
      <p>Frustrated</p>
    </div>
  </div>

  <div class="category-box">
 <label for="category">Complaint Category</label>

<select id="category" name="category">
    <option value="">Select Category</option>
    <option value="Cleanliness">Cleanliness</option>
    <option value="Service">Service</option>
    <option value="Safety">Safety</option>
    <option value="Equipment">Equipment / Facilities</option>
    <option value="Treatment">Treatment</option>
    <option value="Questions">Questions / Suggestions</option>
    <option value="Management">Management</option>
    <option value="Communication">Publicity / Communication</option>
</select>

</div>

  <div class="comment-box">
    <label>Add a comment (optional)</label>
    <textarea id="comment" placeholder="Tell us more..."></textarea>
  </div>

  <div class="comment-box">
<label for="waitingTime">
Estimated Waiting Time
</label>

<select id="waitingTime">
<option value="5">0-5 minutes</option>
<option value="10">5-10 minutes</option>
<option value="20">10-20 minutes</option>
<option value="30">20-30 minutes</option>
<option value="40">30+ minutes</option>
</select>
</div>

  <button class="submit-btn" onclick="submitFeedback()">Submit Feedback</button>

</div>

<script>
let selectedEmotion = "";

function selectEmotion(emotion, element) {
  selectedEmotion = emotion;

  document.querySelectorAll(".emotion-card").forEach(card => {
    card.classList.remove("active");
  });

  element.classList.add("active");
}

function submitFeedback() {
const category =
document.getElementById("category").value;

const comment =
document.getElementById("comment").value;

const waitingTime =
document.getElementById("waitingTime").value;

if (!selectedEmotion) {
    alert("Please select an emotion.");
    return;
}

if (!category) {
    alert("Please select a complaint category.");
    return;
}

fetch("/feedback", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        emotion: selectedEmotion,
        category: category,
        comment: comment,
        waitingTime: waitingTime
    })
})
.then(response => {
    if (response.ok) {
        alert("Feedback submitted successfully!");

        // Reset form
        selectedEmotion = "";

        document.querySelectorAll(".emotion-card").forEach(card => {
            card.classList.remove("active");
        });

        document.getElementById("category").value = "";
        document.getElementById("comment").value = "";
        document.getElementById("waitingTime").selectedIndex = 0;

    } else {
        alert("Submission failed.");
    }
});
}


</script>

</body>
</html>
